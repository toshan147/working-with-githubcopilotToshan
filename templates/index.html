<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RailBook — Online Train Reservation</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-dark: #1342a8;
      --accent: #ff6b35;
      --success: #0d9f6e;
      --danger: #e02424;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a56db 0%, #0f3d99 100%);
      color: white; padding: 0 2rem; display: flex; align-items: center;
      justify-content: space-between; height: 64px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .logo span { color: #ff6b35; }
    nav { display: flex; gap: 4px; }
    nav button {
      background: transparent; border: none; color: rgba(255,255,255,0.8);
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    nav button:hover, nav button.active {
      background: rgba(255,255,255,0.15); color: white;
    }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #1a56db 0%, #0f3d99 100%);
      border-radius: var(--radius); padding: 3rem 2.5rem 2rem;
      color: white; margin-bottom: 2rem;
    }
    .hero h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .hero p  { opacity: 0.8; margin-bottom: 2rem; font-size: 1.05rem; }
    .search-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px; align-items: end;
    }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; opacity: 0.9; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field select, .field input {
      width: 100%; padding: 12px 14px; border-radius: 8px; border: none;
      font-size: 1rem; background: rgba(255,255,255,0.15); color: white;
      outline: none; transition: background 0.2s;
    }
    .field select option { color: var(--text); background: white; }
    .field select:focus, .field input:focus { background: rgba(255,255,255,0.25); }
    .field select::placeholder, .field input::placeholder { color: rgba(255,255,255,0.6); }

    /* ── Buttons ── */
    .btn {
      padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.95rem; font-weight: 600; transition: all 0.2s; display: inline-flex;
      align-items: center; gap: 6px;
    }
    .btn-primary   { background: var(--accent); color: white; }
    .btn-primary:hover   { background: #e05520; transform: translateY(-1px); }
    .btn-secondary { background: var(--primary); color: white; }
    .btn-secondary:hover { background: var(--primary-dark); }
    .btn-success   { background: var(--success); color: white; }
    .btn-danger    { background: var(--danger); color: white; }
    .btn-outline   { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-sm { padding: 7px 14px; font-size: 0.85rem; }

    /* ── Cards ── */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1rem; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .card-title { font-size: 1.1rem; font-weight: 700; }
    .card-sub { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* ── Sections (tabs) ── */
    .section { display: none; }
    .section.active { display: block; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .section-title { font-size: 1.4rem; font-weight: 700; }

    /* ── Train Card ── */
    .train-card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem; margin-bottom: 1rem;
      border-left: 4px solid var(--primary); transition: transform 0.15s;
    }
    .train-card:hover { transform: translateY(-2px); }
    .train-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .train-name { font-size: 1.05rem; font-weight: 700; }
    .train-no   { font-size: 0.8rem; color: var(--muted); }
    .train-route { display: flex; align-items: center; gap: 8px; margin: 0.75rem 0; font-size: 0.95rem; }
    .train-route .city { font-weight: 600; }
    .arrow { color: var(--muted); }
    .train-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
    .train-classes { display: flex; gap: 8px; flex-wrap: wrap; }
    .cls-badge {
      border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px;
      cursor: pointer; font-size: 0.85rem; transition: all 0.15s; background: white;
    }
    .cls-badge:hover { border-color: var(--primary); color: var(--primary); }
    .cls-badge.selected { background: var(--primary); color: white; border-color: var(--primary); }
    .cls-badge .cls-avail { font-size: 0.75rem; opacity: 0.75; }
    .cls-badge.no-seat { opacity: 0.4; cursor: not-allowed; }

    /* ── Booking Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: white; border-radius: var(--radius); padding: 2rem;
      width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-size: 1.2rem; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); line-height: 1; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
    .booking-summary {
      background: var(--bg); border-radius: 8px; padding: 1rem; margin-bottom: 1.25rem; font-size: 0.9rem;
    }
    .booking-summary .row { display: flex; justify-content: space-between; padding: 4px 0; }
    .booking-summary .row.total { font-weight: 700; font-size: 1rem; border-top: 1.5px solid var(--border); margin-top: 6px; padding-top: 8px; }

    /* ── PNR Card ── */
    .pnr-card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem;
    }
    .pnr-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
      font-weight: 700; letter-spacing: 0.5px;
    }
    .pnr-badge.confirmed { background: #d1fae5; color: #065f46; }
    .pnr-badge.cancelled { background: #fee2e2; color: #991b1b; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .info-item label { font-size: 0.78rem; text-transform: uppercase; color: var(--muted); font-weight: 600; letter-spacing: 0.4px; }
    .info-item value { display: block; font-size: 0.95rem; font-weight: 600; margin-top: 2px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; background: white; }
    thead { background: var(--primary); color: white; }
    th { padding: 12px 16px; text-align: left; font-size: 0.85rem; font-weight: 600; }
    td { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8faff; }

    /* ── Alert ── */
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .alert.show { display: block; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .alert-info    { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }

    /* ── Stats bar ── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); text-align: center; }
    .stat-num  { font-size: 2rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .stat-lbl  { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

    /* ── Pagination ── */
    .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 1.5rem; }
    .page-btn {
      padding: 6px 12px; border-radius: 6px; border: 1.5px solid var(--border);
      background: white; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
    }
    .page-btn:hover, .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* ── Misc ── */
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 1rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .search-grid { grid-template-columns: 1fr 1fr; }
      .search-grid .field:last-child { grid-column: 1/-1; }
      .stats { grid-template-columns: 1fr; }
      nav button span { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚂 Rail<span>Book</span></div>
  <nav>
    <button class="active" onclick="showTab('search')"   id="tab-search">🔍 <span>Search</span></button>
    <button onclick="showTab('all-trains')" id="tab-all-trains">🚆 <span>All Trains</span></button>
    <button onclick="showTab('pnr')"        id="tab-pnr">🎫 <span>PNR Status</span></button>
    <button onclick="showTab('my-bookings')" id="tab-my-bookings">📋 <span>My Bookings</span></button>
  </nav>
</header>

<main>

  <!-- ── Search Section ── -->
  <section class="section active" id="section-search">
    <div class="hero">
      <h1>Book Your Train Ticket</h1>
      <p>Search from 100 trains across major Indian routes</p>
      <div class="search-grid">
        <div class="field">
          <label>From</label>
          <select id="fromCity"><option value="">Select city…</option></select>
        </div>
        <div class="field">
          <label>To</label>
          <select id="toCity"><option value="">Select city…</option></select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="travelDate" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="searchTrains()">🔍 Search</button>
        </div>
      </div>
    </div>

    <div id="searchAlert" class="alert"></div>
    <div id="searchResults"></div>
  </section>

  <!-- ── All Trains Section ── -->
  <section class="section" id="section-all-trains">
    <div class="section-header">
      <div class="section-title">All 100 Trains</div>
      <input type="text" placeholder="Filter by name or city…" id="trainFilter"
             oninput="filterTrains()" style="padding:8px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:0.9rem; outline:none; width:220px;">
    </div>
    <div id="allTrainsStats" class="stats"></div>
    <div id="allTrainsTable"></div>
    <div class="pagination" id="allTrainsPagination"></div>
  </section>

  <!-- ── PNR Status Section ── -->
  <section class="section" id="section-pnr">
    <div class="section-header"><div class="section-title">PNR Status</div></div>
    <div class="card" style="max-width:500px">
      <div class="form-group">
        <label>Enter PNR Number</label>
        <input type="text" id="pnrInput" placeholder="e.g. 1000" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:1rem;outline:none;" onkeydown="if(event.key==='Enter') checkPNR()">
      </div>
      <button class="btn btn-secondary" onclick="checkPNR()" style="width:100%">Check Status</button>
    </div>
    <div id="pnrAlert" class="alert"></div>
    <div id="pnrResult"></div>
  </section>

  <!-- ── My Bookings Section ── -->
  <section class="section" id="section-my-bookings">
    <div class="section-header"><div class="section-title">My Bookings</div></div>
    <div class="card" style="max-width:500px">
      <div class="form-group">
        <label>Passenger Name</label>
        <input type="text" id="passengerNameInput" placeholder="Enter your name" style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:1rem;outline:none;" onkeydown="if(event.key==='Enter') fetchMyBookings()">
      </div>
      <button class="btn btn-secondary" onclick="fetchMyBookings()" style="width:100%">Find Bookings</button>
    </div>
    <div id="myBookingsAlert" class="alert"></div>
    <div id="myBookingsResult"></div>
  </section>

</main>

<!-- ── Booking Modal ── -->
<div class="overlay" id="bookingOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Confirm Booking</div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="bookingSummary" class="booking-summary"></div>
    <div class="form-group">
      <label>Passenger Name</label>
      <input type="text" id="passengerName" placeholder="Full name" />
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" id="passengerAge" placeholder="Age" min="1" max="120" />
    </div>
    <div id="bookingAlert" class="alert"></div>
    <button class="btn btn-success" id="confirmBtn" onclick="confirmBooking()" style="width:100%;justify-content:center;margin-top:4px">
      ✔ Confirm &amp; Pay ₹<span id="fareDisplay">0</span>
    </button>
  </div>
</div>

<!-- ── Success Modal ── -->
<div class="overlay" id="successOverlay" onclick="closeSuccess(event)">
  <div class="modal" style="text-align:center; max-width:420px">
    <div style="font-size:3.5rem; margin-bottom:0.75rem">🎉</div>
    <h2 style="font-size:1.4rem; margin-bottom:0.5rem">Booking Confirmed!</h2>
    <p style="color:var(--muted); margin-bottom:1.5rem">Your ticket has been booked successfully.</p>
    <div id="successDetails" class="booking-summary" style="text-align:left"></div>
    <button class="btn btn-secondary" onclick="closeSuccess()" style="width:100%;justify-content:center;margin-top:1rem">Close</button>
  </div>
</div>

<script>
let pendingBooking = null;
let allTrainsData  = [];
let filteredTrains = [];
let currentPage    = 1;
const PER_PAGE     = 20;

// ── Helpers ────────────────────────────────────────────

function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'all-trains' && allTrainsData.length === 0) loadAllTrains();
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.className = `alert ${type} show`;
  el.textContent = msg;
}
function hideAlert(id) {
  document.getElementById(id).className = 'alert';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('bookingOverlay')) {
    document.getElementById('bookingOverlay').classList.remove('open');
    pendingBooking = null;
  }
}
function closeSuccess(e) {
  if (!e || e.target === document.getElementById('successOverlay')) {
    document.getElementById('successOverlay').classList.remove('open');
  }
}

// ── Cities ─────────────────────────────────────────────

async function loadCities() {
  const res = await fetch('/api/cities');
  const cities = await res.json();
  ['fromCity','toCity'].forEach(id => {
    const sel = document.getElementById(id);
    cities.forEach(c => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = c;
      sel.appendChild(opt);
    });
  });
  document.getElementById('travelDate').valueAsDate = new Date();
}

// ── Search ─────────────────────────────────────────────

async function searchTrains() {
  const from = document.getElementById('fromCity').value;
  const to   = document.getElementById('toCity').value;
  hideAlert('searchAlert');

  if (!from || !to) { showAlert('searchAlert','Please select both cities.','alert-error'); return; }
  if (from === to)  { showAlert('searchAlert','Origin and destination cannot be the same.','alert-error'); return; }

  const res  = await fetch(`/api/search?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
  const data = await res.json();
  const container = document.getElementById('searchResults');

  if (!data.length) {
    container.innerHTML = `<div class="empty"><div class="icon">🚫</div><p>No trains found from <b>${from}</b> to <b>${to}</b>.</p></div>`;
    return;
  }

  container.innerHTML = `<p style="margin-bottom:1rem; color:var(--muted)">${data.length} train(s) found from <b>${from}</b> to <b>${to}</b></p>`;
  data.forEach(t => container.appendChild(buildTrainCard(t)));
}

// ── Train Card ─────────────────────────────────────────

function buildTrainCard(t) {
  const card = document.createElement('div');
  card.className = 'train-card';

  const clsBadges = Object.entries(t.classes).map(([cls, info]) => {
    const noSeat = info.available_seats === 0;
    return `<div class="cls-badge${noSeat?' no-seat':''}" onclick="${noSeat?'':`openBooking('${t.number}','${cls}')`}" title="${noSeat?'No seats':'Click to select'}">
      <div style="font-weight:700">${cls} — ₹${info.fare.toFixed(0)}</div>
      <div class="cls-avail">${noSeat?'Waitlist':`${info.available_seats} seats`}</div>
    </div>`;
  }).join('');

  card.innerHTML = `
    <div class="train-top">
      <div>
        <div class="train-name">${t.name}</div>
        <div class="train-no">#${t.number}</div>
      </div>
      <div style="text-align:right; font-size:0.85rem; color:var(--muted)">
        <div>🕐 ${t.departure}</div>
        <div>${t.distance_km} km</div>
      </div>
    </div>
    <div class="train-route">
      <span class="city">${t.source}</span>
      <span class="arrow">──────►</span>
      <span class="city">${t.destination}</span>
    </div>
    <div class="train-classes">${clsBadges}</div>
  `;
  return card;
}

// ── Booking ────────────────────────────────────────────

function openBooking(trainNo, cls) {
  pendingBooking = { trainNo, cls };
  fetch(`/api/trains`)
    .then(r => r.json())
    .then(trains => {
      const t = trains.find(x => x.number === trainNo);
      const info = t.classes[cls];
      document.getElementById('bookingSummary').innerHTML = `
        <div class="row"><span>Train</span><span>${t.name}</span></div>
        <div class="row"><span>Route</span><span>${t.source} → ${t.destination}</span></div>
        <div class="row"><span>Departs</span><span>${t.departure}</span></div>
        <div class="row"><span>Class</span><span>${cls} (${info.fare.toFixed(0) ? cls : cls})</span></div>
        <div class="row total"><span>Fare</span><span>₹${info.fare.toFixed(2)}</span></div>
      `;
      document.getElementById('fareDisplay').textContent = info.fare.toFixed(2);
      document.getElementById('passengerName').value = '';
      document.getElementById('passengerAge').value  = '';
      hideAlert('bookingAlert');
      document.getElementById('bookingOverlay').classList.add('open');
    });
}

async function confirmBooking() {
  const name = document.getElementById('passengerName').value.trim();
  const age  = document.getElementById('passengerAge').value.trim();
  hideAlert('bookingAlert');

  if (!name || !age) { showAlert('bookingAlert','Please fill in all fields.','alert-error'); return; }

  const btn = document.getElementById('confirmBtn');
  btn.innerHTML = '<div class="spinner"></div> Processing…';
  btn.disabled = true;

  const res  = await fetch('/api/book', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ train_no: pendingBooking.trainNo, cls: pendingBooking.cls, name, age })
  });
  const data = await res.json();

  btn.innerHTML = `✔ Confirm &amp; Pay ₹<span id="fareDisplay">${document.getElementById('fareDisplay').textContent}</span>`;
  btn.disabled = false;

  if (!res.ok) { showAlert('bookingAlert', data.error, 'alert-error'); return; }

  closeModal();
  document.getElementById('successDetails').innerHTML = `
    <div class="row"><span>PNR</span><b>${data.pnr}</b></div>
    <div class="row"><span>Train</span><span>${data.train_name}</span></div>
    <div class="row"><span>Route</span><span>${data.source} → ${data.destination}</span></div>
    <div class="row"><span>Class</span><span>${data.class_name} (${data.class})</span></div>
    <div class="row"><span>Passenger</span><span>${data.passenger_name}, Age ${data.passenger_age}</span></div>
    <div class="row total"><span>Fare Paid</span><span>₹${data.fare.toFixed(2)}</span></div>
  `;
  document.getElementById('successOverlay').classList.add('open');
}

// ── All Trains ─────────────────────────────────────────

async function loadAllTrains() {
  const res = await fetch('/api/trains');
  allTrainsData = await res.json();
  filteredTrains = [...allTrainsData];

  const total = allTrainsData.length;
  const booked = allTrainsData.reduce((acc, t) =>
    acc + Object.values(t.classes).reduce((a, c) => a + (c.total_seats - c.available_seats), 0), 0);
  const available = allTrainsData.reduce((acc, t) =>
    acc + Object.values(t.classes).reduce((a, c) => a + c.available_seats, 0), 0);

  document.getElementById('allTrainsStats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Trains</div></div>
    <div class="stat-card"><div class="stat-num">${available}</div><div class="stat-lbl">Available Seats</div></div>
    <div class="stat-card"><div class="stat-num">${booked}</div><div class="stat-lbl">Seats Booked</div></div>
  `;
  renderTrainsTable();
}

function filterTrains() {
  const q = document.getElementById('trainFilter').value.toLowerCase();
  filteredTrains = allTrainsData.filter(t =>
    t.name.toLowerCase().includes(q) ||
    t.source.toLowerCase().includes(q) ||
    t.destination.toLowerCase().includes(q) ||
    t.number.includes(q)
  );
  currentPage = 1;
  renderTrainsTable();
}

function renderTrainsTable() {
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filteredTrains.slice(start, start + PER_PAGE);

  const rows = page.map(t => `
    <tr>
      <td><b>${t.number}</b></td>
      <td>${t.name}</td>
      <td>${t.source}</td>
      <td>${t.destination}</td>
      <td>${t.departure}</td>
      <td>${t.distance_km} km</td>
      <td>
        ${Object.entries(t.classes).map(([cls, info]) =>
          `<span style="display:inline-block;margin:2px;padding:2px 7px;border-radius:4px;font-size:0.75rem;background:${info.available_seats>0?'#dbeafe':'#fee2e2'};color:${info.available_seats>0?'#1e40af':'#991b1b'}">${cls}:${info.available_seats}</span>`
        ).join('')}
      </td>
      <td><button class="btn btn-secondary btn-sm" onclick="quickBook('${t.number}')">Book</button></td>
    </tr>
  `).join('');

  document.getElementById('allTrainsTable').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>No.</th><th>Train Name</th><th>From</th><th>To</th><th>Departs</th><th>Distance</th><th>Seats</th><th></th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  // Pagination
  const pages = Math.ceil(filteredTrains.length / PER_PAGE);
  let pag = '';
  for (let i = 1; i <= pages; i++) {
    pag += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('allTrainsPagination').innerHTML = pag;
}

function goPage(p) {
  currentPage = p;
  renderTrainsTable();
  window.scrollTo({top:0,behavior:'smooth'});
}

function quickBook(trainNo) {
  showTab('search');
  setTimeout(() => openBooking(trainNo, 'SL'), 100);
}

// ── PNR ────────────────────────────────────────────────

async function checkPNR() {
  const pnr = document.getElementById('pnrInput').value.trim();
  hideAlert('pnrAlert');
  document.getElementById('pnrResult').innerHTML = '';

  if (!pnr) { showAlert('pnrAlert','Please enter a PNR.','alert-error'); return; }

  const res  = await fetch(`/api/pnr/${pnr}`);
  const data = await res.json();

  if (!res.ok) { showAlert('pnrAlert', data.error, 'alert-error'); return; }

  const statusBadge = `<span class="pnr-badge ${data.status.toLowerCase()}">${data.status}</span>`;
  document.getElementById('pnrResult').innerHTML = `
    <div class="pnr-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div>
          <div style="font-size:1.2rem;font-weight:700">PNR: ${data.pnr}</div>
          <div style="font-size:0.85rem;color:var(--muted);margin-top:2px">Booked on ${data.booked_at}</div>
        </div>
        ${statusBadge}
      </div>
      <div class="info-grid">
        <div class="info-item"><label>Train</label><value>${data.train_name} (${data.train_no})</value></div>
        <div class="info-item"><label>Route</label><value>${data.source} → ${data.destination}</value></div>
        <div class="info-item"><label>Departure</label><value>${data.departure}</value></div>
        <div class="info-item"><label>Class</label><value>${data.class_name} (${data.class})</value></div>
        <div class="info-item"><label>Passenger</label><value>${data.passenger_name}</value></div>
        <div class="info-item"><label>Age</label><value>${data.passenger_age}</value></div>
        <div class="info-item"><label>Fare</label><value>₹${data.fare.toFixed(2)}</value></div>
      </div>
      ${data.status === 'CONFIRMED' ? `
      <div style="margin-top:1.25rem">
        <button class="btn btn-danger btn-sm" onclick="cancelTicket('${data.pnr}')">Cancel Ticket (75% refund)</button>
      </div>` : ''}
    </div>
  `;
}

async function cancelTicket(pnr) {
  if (!confirm(`Cancel ticket PNR ${pnr}? You'll receive a 75% refund.`)) return;
  const res  = await fetch(`/api/cancel/${pnr}`, { method:'POST' });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  showAlert('pnrAlert', `Ticket cancelled. Refund of ₹${data.refund.toFixed(2)} will be processed.`, 'alert-success');
  checkPNR();
}

// ── My Bookings ────────────────────────────────────────

async function fetchMyBookings() {
  const name = document.getElementById('passengerNameInput').value.trim();
  hideAlert('myBookingsAlert');
  document.getElementById('myBookingsResult').innerHTML = '';

  if (!name) { showAlert('myBookingsAlert','Please enter your name.','alert-error'); return; }

  const res  = await fetch(`/api/my-bookings?name=${encodeURIComponent(name)}`);
  const data = await res.json();

  if (!data.length) {
    document.getElementById('myBookingsResult').innerHTML = `<div class="empty"><div class="icon">📭</div><p>No bookings found for <b>${name}</b>.</p></div>`;
    return;
  }

  const rows = data.map(b => `
    <tr>
      <td><b>${b.pnr}</b></td>
      <td>${b.train_name}</td>
      <td>${b.source} → ${b.destination}</td>
      <td>${b.class_name} (${b.class})</td>
      <td>₹${b.fare.toFixed(2)}</td>
      <td><span class="pnr-badge ${b.status.toLowerCase()}">${b.status}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="showPNR('${b.pnr}')">View</button>
        ${b.status==='CONFIRMED' ? `<button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="cancelFromList('${b.pnr}','${name}')">Cancel</button>` : ''}
      </td>
    </tr>
  `).join('');

  document.getElementById('myBookingsResult').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>PNR</th><th>Train</th><th>Route</th><th>Class</th><th>Fare</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function showPNR(pnr) {
  showTab('pnr');
  document.getElementById('pnrInput').value = pnr;
  setTimeout(checkPNR, 50);
}

async function cancelFromList(pnr, name) {
  if (!confirm(`Cancel PNR ${pnr}? 75% refund will be issued.`)) return;
  const res = await fetch(`/api/cancel/${pnr}`, { method:'POST' });
  const data = await res.json();
  if (!res.ok) { alert(data.error); return; }
  showAlert('myBookingsAlert', `PNR ${pnr} cancelled. Refund of ₹${data.refund.toFixed(2)} initiated.`, 'alert-success');
  document.getElementById('passengerNameInput').value = name;
  fetchMyBookings();
}

// ── Init ───────────────────────────────────────────────
loadCities();
</script>
