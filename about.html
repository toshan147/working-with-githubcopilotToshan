<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me – Toshan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 48px;
      max-width: 560px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 24px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .title {
      font-size: 1rem;
      color: #6c63ff;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #6c63ff, #3ecfcf);
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .bio {
      font-size: 1rem;
      line-height: 1.7;
      color: #a0a0c0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">T</div>
    <h1>Toshan</h1>
    <p class="title">Software Developer</p>
    <div class="divider"></div>
    <p class="bio">
      Hi, I'm Toshan — a software developer passionate about building clean,
      efficient solutions. Welcome to my corner of the web.
    </p>
  </div>
</body>
</html>
